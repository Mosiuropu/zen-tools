<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen Tools 🧘‍♂️</title>
    <style>
      /* Inline fallback before CSS loads. Uses background-color (not the
         background shorthand) so Tailwind's radial gradients survive, and
         follows the app's .dark class instead of the OS color scheme. */
      body { margin: 0; background-color: #F6F5F1; color: #1A1A1E; }
      html.dark body { background-color: #0B0B12; color: #EEEEF5; }
    </style>
    <script>
      // Apply saved theme before first paint to avoid a flash. Default: dark.
      (function () {
        try {
          var t = localStorage.getItem('zen_theme');
          if (t ? t === 'dark' : true) document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        Loading Zen Tools Hub...
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
